<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bolso · Gestão Financeira Pessoal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="app-general">
      <!-------------------Popup De Lançamentos---------------->
      <div class="popup-modal display-none" id="popup-modal">
        <div class="container-modal-title">
          <h1 class="modal-title">Novo lançamento</h1>
          <button class="close-modal-btn" id="close-popup">x</button>
        </div>

        <div class="popup-plus-minus-btn">
          <button class="popup-btn" id="expense-btn">Gasto</button>
          <button class="popup-btn" id="income-btn">Recebimento</button>
        </div>

        <div class="transaction-form-container">
          <label class="popup-container">
            <span class="span-popup">Valor</span>
            <input
              type="number"
              min="0"
              placeholder="0,00"
              id="valueInput"
              required
            />
          </label>

          <label class="popup-container">
            <span class="span-popup">Categoria</span>
            <select id="category-select" required>
              <option value="alimentacao">Alimentação</option>
              <option value="transporte">Transporte</option>
              <option value="moradia">Moradia</option>
              <option value="lazer">Lazer</option>
              <option value="saude">Saúde</option>
              <option value="salario">Salário</option>
              <option value="extra">Renda extra</option>
              <option value="outros">Outros</option>
            </select>
          </label>

          <label class="popup-container">
            <span class="span-popup">Descrição</span>
            <input
              type="text"
              id="descriptionInput"
              placeholder="Ex: Supermercado do mês"
              required
            />
          </label>

          <label class="popup-container">
            <span class="span-popup">Forma de pagamento</span>
            <select id="payment-select" required>
              <option value="pix">Pix</option>
              <option value="debito">Cartão de débito</option>
              <option value="credito">Cartão de crédito</option>
              <option value="dinheiro">Dinheiro</option>
              <option value="transferencia">Transferência</option>
            </select>
          </label>

          <label class="popup-container">
            <span class="span-popup">Data</span>
            <input type="date" id="dateInput" required />
          </label>

          <button type="submit" class="btn-submit">Salvar lançamento</button>
        </div>
      </div>
      <header class="app-header">
        <h1 class="app-title">Bolso</h1>
        <nav>
          <button
            onclick="mostrarPagina('dashboard')"
            class="btn-header btn-header-active"
            id="btn-dashboard"
          >
            Inicio
          </button>
          <button
            onclick="mostrarPagina('expenses')"
            class="btn-header btn-header-active"
            id="btn-expenses"
          >
            Lançamentos
          </button>
          <button
            onclick="mostrarPagina('fixedExpenses')"
            class="btn-header btn-header-active"
            id="btn-fixedExpenses"
          >
            Fixos
          </button>
          <button
            onclick="mostrarPagina('reserved')"
            class="btn-header btn-header-active"
            id="btn-reserved"
          >
            Reservas
          </button>
        </nav>
      </header>
      <main>
        <!-- Seção do Dashboard -->
        <section id="dashboard" class="page">
          <header class="page-header">
            <h1 class="dashboard-title">Olá, Usuario</h1>
          </header>
          <div class="current-balance">
            <span>Saldo atual</span>
            <p>1.000,00</p>
          </div>
          <div class="stats-grid">
            <div class="stats-card stats-card--expenses">
              <span>Gasto no mês</span>
              <p>700,00</p>
            </div>
            <div class="stats-card stats-card--reserve">
              <span>Guardados</span>
              <p>1.750,00</p>
            </div>
          </div>
        </section>
        <!-- Seção de Lançamentos -->
        <section id="expenses" class="page">
          <header class="page-header">
            <h1>Lançamentos</h1>
          </header>
          <div class="container-btn-new-expenses">
            <button class="btn-new-expenses" id="new-expense">
              Novo Lançamento
            </button>
          </div>
          <div class="grid-expenses" id="grid-expenses">
            <div class="card-expenses">
              <h2>Alimentação</h2>
              <p>25,99</p>
              <p>Compras no Mercado</p>
              <div class="division-card">
                <p>Pix</p>
                <p>10/11/2026</p>
              </div>
              <button class="btn-delete">Excluir</button>
            </div>
          </div>
        </section>
        <!-- Seção de Fixos -->
        <section id="fixedExpenses" class="page">
          <header class="page-header">
            <h1>Gastos Fixos</h1>
          </header>
          <div class="container-btn-new-expenses">
            <button class="btn-new-expenses">Novo Gasto Fixo</button>
          </div>
          <div class="grid-expenses">
            <div class="card-expenses">
              <div class="especifications">
                <h2>Spotify</h2>
                <p>16,00</p>
              </div>
              <div class="btns-new-expenses">
                <button class="change-btn pending" id="pending-btn">
                  Pendente
                </button>
                <button class="btn-delete">Excluir</button>
              </div>
            </div>
          </div>
        </section>
        <!-- Seção de Reservas -->
        <section id="reserved" class="page">
          <header class="page-header">
            <h1>Reserva</h1>
          </header>
          <div class="container-btn-new-expenses">
            <button class="btn-new-expenses">Nova Reserva</button>
          </div>
          <div class="grid-expenses">
            <div class="card-expenses">
              <div class="especifications">
                <h2>NootBook</h2>
                <p>1.750,00</p>
              </div>
              <div class="btns-delete-plus-minus">
                <div class="change-btns half">
                  <button class="btn-plus-minus" id="plus-btn">+</button>
                  <button class="btn-plus-minus" id="minus-btn">-</button>
                </div>
                <button class="btn-delete half">Excluir</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
